<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Cronometro web profesional con cuenta ascendente y cuenta atras">
  <title>Cronometro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <section class="timer" aria-label="Temporizador">
      <h1 class="timer__title">Cronometro</h1>

      <label class="timer__label" for="timeDisplay">Tiempo</label>
      <input id="timeDisplay"
             class="display-input display-input--ready"
             type="text"
             value="00:00:00"
             readonly
             aria-describedby="hint">
      <p id="hint" class="timer__hint">Pulsa teclas numericas para introducir el tiempo</p>

      <div class="status" aria-live="polite">
        <span id="statusDot" class="status__dot status__dot--idle" aria-hidden="true"></span>
        <span id="statusLabel" class="status__text">Listo</span>
      </div>

      <div class="progress" aria-hidden="true">
        <div id="progressFill" class="progress__fill"></div>
      </div>
    </section>

    <section class="controls" aria-label="Controles del cronometro">
      <div class="controls__row">
        <button type="button" id="btnSet" class="btn btn--set">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="20 6 9 17 4 12"/></svg>
          Set
        </button>
        <button type="button" id="btnLimpiar" class="btn btn--clear">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          Limpiar
        </button>
      </div>

      <div class="controls__row">
        <button type="button" id="btnInicio" class="btn btn--start" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><polygon points="6 4 20 12 6 20"/></svg>
          Inicio
        </button>
        <button type="button" id="btnCuentaAtras" class="btn btn--countdown" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 8 14"/></svg>
          Cuenta atras
        </button>
      </div>

      <div id="stopRow" class="controls__row" hidden>
        <button type="button" class="btn btn--stop">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
          Stop
        </button>
      </div>
    </section>

    <div id="toastRegion" class="toast" role="status" aria-live="polite"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
