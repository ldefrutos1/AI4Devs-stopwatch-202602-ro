<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cronómetro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-grid"></div>

  <main class="container">

    <header class="app-header">
      <div class="logo-mark">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="22" r="14" stroke="currentColor" stroke-width="2"/>
          <path d="M20 12V22L26 28" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M16 4H24" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <path d="M20 4V8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 class="app-title">CRONÓMETRO</h1>
      <p class="app-subtitle">Precisión al instante</p>
    </header>

    <section class="display-section">
      <div class="display-wrapper" id="displayWrapper">
        <div class="display-ring"></div>
        <div class="display-inner">
          <div class="mode-badge" id="modeBadge">—</div>
          <input
            type="text"
            id="timeDisplay"
            class="time-display"
            value="00:00:00"
            readonly
            aria-label="Tiempo cronometrado"
          />
          <div class="subseconds">
            <span id="subMs">00</span>
          </div>
        </div>
      </div>
    </section>

    <section class="keypad-section">
      <div class="keypad-label">Introducir tiempo</div>
      <div class="keypad" id="keypad" role="group" aria-label="Teclado numérico">
        <button class="key" data-val="1">1</button>
        <button class="key" data-val="2">2</button>
        <button class="key" data-val="3">3</button>
        <button class="key" data-val="4">4</button>
        <button class="key" data-val="5">5</button>
        <button class="key" data-val="6">6</button>
        <button class="key" data-val="7">7</button>
        <button class="key" data-val="8">8</button>
        <button class="key" data-val="9">9</button>
        <button class="key key-wide" data-val="00">00</button>
        <button class="key" data-val="0">0</button>
        <button class="key key-del" id="delKey" aria-label="Borrar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
            <line x1="18" y1="9" x2="12" y2="15"/>
            <line x1="12" y1="9" x2="18" y2="15"/>
          </svg>
        </button>
      </div>
    </section>

    <section class="controls-section">
      <div class="controls-row controls-top">
        <button class="btn btn-set" id="btnSet" title="Fijar tiempo">
          <!-- icon-set: clock with anchor pin -->
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="11" cy="12" r="8"/>
            <polyline points="11 8 11 12 14 14"/>
            <line x1="17" y1="3" x2="21" y2="7"/>
            <line x1="21" y1="3" x2="17" y2="7"/>
          </svg>
          <span>Set</span>
        </button>
        <button class="btn btn-clear" id="btnClear" title="Limpiar">
          <!-- icon-clear: refresh/reset -->
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
          </svg>
          <span>Limpiar</span>
        </button>
      </div>
      <div class="controls-row controls-bottom">
        <button class="btn btn-start" id="btnStart" title="Iniciar cronómetro ascendente">
          <!-- icon-start: play in circle -->
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <polygon points="10 8 16 12 10 16 10 8" fill="currentColor" stroke="none"/>
          </svg>
          <span>Inicio</span>
        </button>
        <button class="btn btn-countdown" id="btnCountdown" title="Iniciar cuenta atrás">
          <!-- icon-countdown: clock with down arrow -->
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="13" r="8"/>
            <polyline points="12 9 12 13 15 15"/>
            <polyline points="9 3 12 6 15 3"/>
          </svg>
          <span>Cuenta atrás</span>
        </button>
      </div>
    </section>

    <section class="status-bar">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Listo</span>
    </section>

  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="alert" aria-live="assertive">
    <span class="toast-icon">⏱</span>
    <span class="toast-msg" id="toastMsg"></span>
  </div>

  <script src="script.js"></script>
</body>
</html>
